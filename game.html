<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Night Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #606468; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0a0a0a;
      z-index: 100;
      transition: opacity 0.8s ease;
    }
    #overlay h1 {
      font-size: clamp(2rem, 6vw, 5rem);
      letter-spacing: 0.3em;
      color: #fff;
      text-transform: uppercase;
      margin-bottom: 0.3em;
    }
    #overlay p {
      color: #666;
      letter-spacing: 0.15em;
      font-size: 0.85rem;
      margin-bottom: 2.5em;
    }
    #loadBar {
      width: min(400px, 80vw);
      height: 2px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }
    #loadFill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff6b00, #ffcc00);
      transition: width 0.3s ease;
    }
    #loadText {
      margin-top: 1em;
      color: #444;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>NIGHT DRIVE</h1>
  <p>loading assets</p>
  <div id="loadBar"><div id="loadFill"></div></div>
  <div id="loadText">initializing engine...</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { USDZLoader }      from 'three/addons/loaders/USDZLoader.js';
import { EffectComposer }  from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }      from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }      from 'three/addons/postprocessing/OutputPass.js';

// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const ROAD_WIDTH       = 14;
const ROAD_LENGTH      = 50;
const ROAD_POOL        = 12;
const BUILDING_POOL    = 48;
const SPAWN_DIST       = ROAD_LENGTH * 3.5;
const DESPAWN_DIST     = ROAD_LENGTH * 1.8;
const FOG_COLOR        = 0x606468;   // gray night sky
const MAX_SPEED        = 0.55;
const ACCEL            = 0.012;
const FRICTION         = 0.94;
const STEER_SPEED      = 0.028;
const STEER_RETURN     = 0.88;
const COLLISION_BOUNCE          = -0.35;
const COLLISION_COOLDOWN_FRAMES = 20;    // ~333 ms at 60 fps – prevents repeated speed-reversal
const BOUNDARY_COOLDOWN_FRAMES  = 10;    // shorter cooldown for road-edge bounce
// Building center X distance from road center
const BLDG_X           = ROAD_WIDTH / 2 + 9;

// ─────────────────────────────────────────────
//  SCENE
// ─────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(FOG_COLOR);
scene.fog = new THREE.FogExp2(FOG_COLOR, 0.072);  // heavy fog

// ─────────────────────────────────────────────
//  RENDERER
// ─────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = false;  // disabled for performance; fog hides distance anyway
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ─────────────────────────────────────────────
//  CAMERA  (attached to car, driver's-seat view)
// ─────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 250);
// Positioned inside carGroup at driver's seat; faces –Z (forward)
camera.position.set(-0.42, 1.18, 0.28);
camera.rotation.set(0, 0, 0);

// ─────────────────────────────────────────────
//  POST-PROCESSING
// ─────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));

const bloom = new UnrealBloomPass(
  new THREE.Vector2(innerWidth, innerHeight),
  1.5,   // strength
  0.55,  // radius
  0.68   // threshold
);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ─────────────────────────────────────────────
//  LIGHTING
// ─────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x707880, 0.45));

const overcast = new THREE.DirectionalLight(0x9098a8, 0.25);
overcast.position.set(-20, 40, 10);
scene.add(overcast);

// ─────────────────────────────────────────────
//  CAR GROUP
// ─────────────────────────────────────────────
const carGroup = new THREE.Group();
scene.add(carGroup);

// Camera lives inside the car at the driver's seat
carGroup.add(camera);

// ─── Headlight emissive discs (bloom sources) ───
function makeHeadlightDisc(xOff) {
  const geo = new THREE.CircleGeometry(0.18, 12);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xffffee, emissive: 0xffffc0, emissiveIntensity: 9,
    transparent: true, opacity: 0.95, depthWrite: false
  });
  const disc = new THREE.Mesh(geo, mat);
  disc.rotation.y = Math.PI;
  disc.position.set(xOff, 0.42, -2.02);
  carGroup.add(disc);
}
makeHeadlightDisc(-0.52);
makeHeadlightDisc( 0.52);

// ─── Headlight spotlights ───
function makeSpotlight(xOff) {
  const sl = new THREE.SpotLight(0xffffcc, 220, 75, Math.PI / 7, 0.4, 1.8);
  sl.position.set(xOff, 0.45, -1.9);
  sl.target.position.set(xOff * 1.1, -2, -28);
  sl.castShadow = false;
  carGroup.add(sl);
  carGroup.add(sl.target);
}
makeSpotlight(-0.52);
makeSpotlight( 0.52);

// ─── Front glow point light ───
const glowPt = new THREE.PointLight(0xffdd88, 18, 14, 2);
glowPt.position.set(0, 0.4, -2.4);
carGroup.add(glowPt);

// ─── Tail lights ───
const tailGlow = new THREE.PointLight(0xff2200, 4, 5, 2);
tailGlow.position.set(0, 0.4, 2.2);
carGroup.add(tailGlow);

function makeTailDisc(xOff) {
  const geo = new THREE.CircleGeometry(0.12, 8);
  const mat = new THREE.MeshStandardMaterial({
    color: 0xff1100, emissive: 0xff1100, emissiveIntensity: 5,
    transparent: true, opacity: 0.9, depthWrite: false
  });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(xOff, 0.42, 2.02);
  carGroup.add(m);
}
makeTailDisc(-0.45);
makeTailDisc( 0.45);

// ─── Fallback car body (used until USDZ loads) ───
const fallbackCar = (() => {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x1a2a6c, roughness: 0.4, metalness: 0.6 });
  const cabMat  = new THREE.MeshStandardMaterial({ color: 0x0f1a4a, roughness: 0.3, metalness: 0.5 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.65, 4.0), bodyMat);
  body.position.y = 0.55;
  const cab  = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.55, 2.0), cabMat);
  cab.position.set(0, 1.1, -0.2);
  g.add(body);
  g.add(cab);
  return g;
})();
carGroup.add(fallbackCar);

// ─────────────────────────────────────────────
//  ROAD MATERIALS  (shared instances)
// ─────────────────────────────────────────────
const roadMat      = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.92 });
const sidewalkMat  = new THREE.MeshStandardMaterial({ color: 0x2e2e2e, roughness: 0.95 });
const kerbMat      = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, emissive: 0x222211, emissiveIntensity: 0.15 });
const lineMatDash  = new THREE.MeshStandardMaterial({ color: 0xddcc44, emissive: 0x887722, emissiveIntensity: 0.45 });
const lineMatSolid = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x888844, emissiveIntensity: 0.3 });

// ─────────────────────────────────────────────
//  FACTORY: Road Segment
// ─────────────────────────────────────────────
function buildRoadSegment() {
  const root = new THREE.Group();

  // Asphalt
  const asphalt = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH), roadMat);
  asphalt.rotation.x = -Math.PI / 2;
  root.add(asphalt);

  // Sidewalks
  const swGeo = new THREE.BoxGeometry(5, 0.12, ROAD_LENGTH);
  for (const side of [-1, 1]) {
    const sw = new THREE.Mesh(swGeo, sidewalkMat);
    sw.position.set(side * (ROAD_WIDTH / 2 + 2.5), 0.06, 0);
    root.add(sw);
  }

  // Kerb strips
  const kerbGeo = new THREE.BoxGeometry(0.25, 0.18, ROAD_LENGTH);
  for (const side of [-1, 1]) {
    const k = new THREE.Mesh(kerbGeo, kerbMat);
    k.position.set(side * (ROAD_WIDTH / 2 + 0.125), 0.09, 0);
    root.add(k);
  }

  // Center dashes
  const dashCount = 10;
  const dashLen   = ROAD_LENGTH / dashCount;
  const dashGeo   = new THREE.PlaneGeometry(0.18, dashLen * 0.55);
  for (let i = 0; i < dashCount; i++) {
    const d = new THREE.Mesh(dashGeo, lineMatDash);
    d.rotation.x = -Math.PI / 2;
    d.position.set(0, 0.005, -ROAD_LENGTH / 2 + dashLen * (i + 0.5));
    root.add(d);
  }

  // Lane dividers
  for (const x of [-ROAD_WIDTH / 4, ROAD_WIDTH / 4]) {
    const lane = new THREE.Mesh(new THREE.PlaneGeometry(0.1, ROAD_LENGTH), lineMatSolid);
    lane.rotation.x = -Math.PI / 2;
    lane.position.set(x, 0.004, 0);
    root.add(lane);
  }

  return root;
}

// ─────────────────────────────────────────────
//  FACTORY: Fallback Building
// ─────────────────────────────────────────────
const buildingPalette = [0x28283a, 0x1d2d1d, 0x2e1e18, 0x182030, 0x26201a, 0x1e1828];

// Shared window materials (avoid per-building material creation)
const winMatWarm = new THREE.MeshStandardMaterial({
  color: 0xffdd99, emissive: 0xffaa44, emissiveIntensity: 1.3,
  transparent: true, opacity: 0.9, depthWrite: false
});
const winMatCool = new THREE.MeshStandardMaterial({
  color: 0x88bbff, emissive: 0x4488cc, emissiveIntensity: 1.1,
  transparent: true, opacity: 0.9, depthWrite: false
});
const winGeoShared = new THREE.PlaneGeometry(0.45, 0.55);

let bldgSeed = 17;
function rngNext(n) {
  bldgSeed = (bldgSeed * 1664525 + 1013904223) & 0xffffffff;
  return ((bldgSeed >>> 0) % n);
}

function buildFallbackBuilding() {
  const g   = new THREE.Group();
  const w   = 7  + rngNext(8);   // X extent
  const h   = 8  + rngNext(20);  // height
  const d   = 6  + rngNext(9);   // Z extent (road direction)
  const ci  = rngNext(buildingPalette.length);

  const bodyMat = new THREE.MeshStandardMaterial({ color: buildingPalette[ci], roughness: 0.85 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), bodyMat);
  body.position.y = h / 2;
  g.add(body);

  // Windows on the face toward the road (+X face for left-side, –X face for right-side)
  // We place them on both side faces so the building looks correct from the road
  const rows = Math.max(1, Math.floor(h / 2) - 1);
  const cols = Math.max(1, Math.floor(d / 2));
  for (const faceX of [-w / 2 - 0.01, w / 2 + 0.01]) {
    const facingRight = faceX > 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (rngNext(3) === 0) continue;
        const win = new THREE.Mesh(winGeoShared, rngNext(2) === 0 ? winMatWarm : winMatCool);
        win.position.set(faceX, 1.3 + r * 1.9, -d / 2 + (c + 0.8) * (d / cols));
        win.rotation.y = facingRight ? -Math.PI / 2 : Math.PI / 2;
        g.add(win);
      }
    }
  }

  // Rooftop accent
  if (rngNext(2) === 0) {
    const rt = new THREE.Mesh(new THREE.BoxGeometry(w * 0.35, 1.5 + rngNext(4), d * 0.35), bodyMat);
    rt.position.y = h + 0.75;
    g.add(rt);
  }

  // Store Z-extent so the spawner can pack buildings with no gap
  g.userData.bldgD = d;
  return g;
}

// ─────────────────────────────────────────────
//  OBJECT POOLS
// ─────────────────────────────────────────────
const roadPool     = Array.from({ length: ROAD_POOL     }, () => { const r = buildRoadSegment();    r.visible = false; scene.add(r); return r; });
const buildingPool = Array.from({ length: BUILDING_POOL }, () => { const b = buildFallbackBuilding(); b.visible = false; scene.add(b); return b; });

const activeRoads     = [];
const activeBuildings = [];

// ─────────────────────────────────────────────
//  SPAWN STATE
// ─────────────────────────────────────────────
let roadFrontZ  = 0;
let leftFrontZ  = 0;   // next building spawn edge on left side
let rightFrontZ = 0;   // next building spawn edge on right side

function getFromPool(pool) {
  return pool.find(o => !o.visible) ?? null;
}

function spawnRoad(z) {
  const seg = getFromPool(roadPool);
  if (!seg) return;
  seg.position.set(0, 0, z);
  seg.visible = true;
  activeRoads.push(seg);
}

// Pack buildings side-by-side on each edge of the road (no Z gaps)
function spawnBuildingsSideBySide() {
  const aheadZ = carGroup.position.z - SPAWN_DIST;

  // Left side (negative X)
  while (leftFrontZ > aheadZ) {
    const bld = getFromPool(buildingPool);
    if (!bld) break;
    const d = bld.userData.bldgD ?? 10;  // 10 is mid-range of 6–14 building depth
    bld.position.set(-BLDG_X, 0, leftFrontZ - d * 0.5);
    bld.rotation.y = 0;
    bld.visible = true;
    bld.userData.bbox = new THREE.Box3().setFromObject(bld);
    activeBuildings.push(bld);
    leftFrontZ -= d;
  }

  // Right side (positive X)
  while (rightFrontZ > aheadZ) {
    const bld = getFromPool(buildingPool);
    if (!bld) break;
    const d = bld.userData.bldgD ?? 10;  // 10 is mid-range of 6–14 building depth
    bld.position.set(BLDG_X, 0, rightFrontZ - d * 0.5);
    bld.rotation.y = Math.PI; // windows face –X toward road
    bld.visible = true;
    bld.userData.bbox = new THREE.Box3().setFromObject(bld);
    activeBuildings.push(bld);
    rightFrontZ -= d;
  }
}

function seedWorld() {
  // Seed road segments behind and ahead of start
  for (let i = 0; i < ROAD_POOL; i++) {
    spawnRoad(roadFrontZ);
    roadFrontZ -= ROAD_LENGTH;
  }
  // Seed buildings
  spawnBuildingsSideBySide();
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ─────────────────────────────────────────────
//  PHYSICS
// ─────────────────────────────────────────────
let speed             = 0;
let steerAng          = 0;
let collisionCooldown = 0;   // frames to skip collision after a bounce

const carBox       = new THREE.Box3();
const carBoxShrink = new THREE.Vector3(0.18, 0, 0.28);

function updateCar(dt) {
  const fwd  = keys['KeyW'] || keys['ArrowUp'];
  const back = keys['KeyS'] || keys['ArrowDown'];
  const lft  = keys['KeyA'] || keys['ArrowLeft'];
  const rgt  = keys['KeyD'] || keys['ArrowRight'];

  if (fwd)  speed -= ACCEL * dt;
  if (back) speed += ACCEL * 0.55 * dt;
  speed *= Math.pow(FRICTION, dt);
  speed = Math.max(-MAX_SPEED * 0.4, Math.min(MAX_SPEED, speed));

  const sf = Math.abs(speed) / MAX_SPEED;
  if (lft) steerAng += STEER_SPEED * sf * dt;
  if (rgt) steerAng -= STEER_SPEED * sf * dt;
  steerAng *= Math.pow(STEER_RETURN, dt);

  if (Math.abs(speed) > 0.002) {
    carGroup.rotation.y += steerAng * dt;
  }

  const dir = new THREE.Vector3(0, 0, -1).applyEuler(carGroup.rotation);
  carGroup.position.addScaledVector(dir, speed * dt);
  carGroup.position.y = 0;

  // Tail lights brighten when braking
  tailGlow.intensity = (back) ? 14 : 4;
}

function doCollisions() {
  if (collisionCooldown > 0) { collisionCooldown--; return; }

  carBox.setFromObject(carGroup);
  carBox.min.add(carBoxShrink);
  carBox.max.sub(carBoxShrink);

  for (const bld of activeBuildings) {
    if (!bld.visible || !bld.userData.bbox) continue;

    const dx = bld.position.x - carGroup.position.x;
    const dz = bld.position.z - carGroup.position.z;
    if (dx * dx + dz * dz > 625) continue;   // early-out: skip buildings beyond 25-unit radius

    if (carBox.intersectsBox(bld.userData.bbox)) {
      speed *= COLLISION_BOUNCE;
      steerAng = 0;            // clear steering so it doesn't feel like a control flip
      const push = new THREE.Vector3()
        .subVectors(carGroup.position, bld.position)
        .normalize();
      carGroup.position.addScaledVector(push, 0.6);
      collisionCooldown = COLLISION_COOLDOWN_FRAMES;  // ~333 ms at 60 fps – prevents repeated speed-reversal
      break;                   // handle at most one building collision per frame
    }
  }

  // Keep car on road
  if (Math.abs(carGroup.position.x) > ROAD_WIDTH / 2 + 1.5) {
    speed *= -0.4;
    carGroup.position.x = Math.sign(carGroup.position.x) * (ROAD_WIDTH / 2 + 1.5);
    collisionCooldown = Math.max(collisionCooldown, BOUNDARY_COOLDOWN_FRAMES);
  }
}

// ─────────────────────────────────────────────
//  WORLD STREAMING
// ─────────────────────────────────────────────
function updateWorld() {
  const cz = carGroup.position.z;

  // Spawn road tiles ahead
  while (roadFrontZ > cz - SPAWN_DIST) {
    spawnRoad(roadFrontZ);
    roadFrontZ -= ROAD_LENGTH;
  }

  // Spawn buildings ahead (side-by-side, no gaps)
  spawnBuildingsSideBySide();

  // Recycle road tiles behind
  for (let i = activeRoads.length - 1; i >= 0; i--) {
    if (activeRoads[i].position.z > cz + DESPAWN_DIST) {
      activeRoads[i].visible = false;
      activeRoads.splice(i, 1);
    }
  }

  // Recycle buildings behind
  for (let i = activeBuildings.length - 1; i >= 0; i--) {
    const b = activeBuildings[i];
    if (b.position.z > cz + DESPAWN_DIST) {
      b.visible = false;
      activeBuildings.splice(i, 1);
    }
  }
}

// ─────────────────────────────────────────────
//  ASSET LOADING
// ─────────────────────────────────────────────
let assetsTotal  = 4;
let assetsLoaded = 0;

const loadFillEl = document.getElementById('loadFill');
const loadTextEl = document.getElementById('loadText');
const overlayEl  = document.getElementById('overlay');

function onAssetLoaded(name) {
  assetsLoaded++;
  loadFillEl.style.width = (assetsLoaded / assetsTotal * 100) + '%';
  loadTextEl.textContent = `loaded: ${name}`;
  if (assetsLoaded >= assetsTotal) {
    setTimeout(() => {
      overlayEl.style.opacity = '0';
      setTimeout(() => { overlayEl.style.display = 'none'; }, 800);
    }, 400);
  }
}

function normaliseModel(obj, targetSize) {
  const box  = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  obj.scale.setScalar(targetSize / Math.max(size.x, size.y, size.z));
  const box2 = new THREE.Box3().setFromObject(obj);
  obj.position.sub(box2.getCenter(new THREE.Vector3()));
  const box3 = new THREE.Box3().setFromObject(obj);
  obj.position.y -= box3.min.y;
  return obj;
}

const usdzLoader = new USDZLoader();

// ─── Car model ───
usdzLoader.load('./assets/Small_price_car.usdz',
  (obj) => {
    normaliseModel(obj, 4);
    carGroup.add(obj);
    fallbackCar.visible = false;
    onAssetLoaded('car');
  },
  null,
  () => { console.warn('Car USDZ failed – using fallback'); onAssetLoaded('car (fallback)'); }
);

// ─── Road tile ───
usdzLoader.load('./assets/Street_road.usdz',
  (obj) => { normaliseModel(obj, ROAD_LENGTH); onAssetLoaded('road'); },
  null,
  () => { console.warn('Road USDZ failed'); onAssetLoaded('road (fallback)'); }
);

// ─── Building models ───
const buildingTemplates = [];

usdzLoader.load('./assets/Old_Japanese_Store.usdz',
  (obj) => {
    normaliseModel(obj, 10);
    buildingTemplates.push(obj);
    onAssetLoaded('Japanese store');
  },
  null,
  () => { console.warn('Japanese store USDZ failed'); onAssetLoaded('store (fallback)'); }
);

usdzLoader.load('./assets/Old_Concete_Building_Pack__Lowpoly.usdz',
  (obj) => {
    normaliseModel(obj, 12);
    buildingTemplates.push(obj);
    onAssetLoaded('concrete building');
  },
  null,
  () => { console.warn('Concrete building USDZ failed'); onAssetLoaded('building (fallback)'); }
);

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
let lastTime = performance.now();

seedWorld();

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  const dt  = Math.min((now - lastTime) / 16.667, 3);
  lastTime  = now;

  updateCar(dt);
  doCollisions();
  updateWorld();

  composer.render();
}

animate();

// ─────────────────────────────────────────────
//  RESIZE
// ─────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  bloom.resolution.set(innerWidth, innerHeight);
});
</script>
</body>
</html>
